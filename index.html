<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>treesis</title>
<link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="Images/TreesisLogo.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f0ebe0;
    --dark: #282D1D;
    --mid: #3a3a2e;
    --grid-line: #282D1D;
  }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: Helvetica, Arial, sans-serif;
    letter-spacing: -0.02em;
    line-height: 0.92;
    overflow-x: hidden;
  }

  .nav-link {
    font-family: Helvetica, Arial, sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--dark);
    cursor: pointer;
    opacity: 0.45;
    transition: opacity 0.15s;
    line-height: 1;
    background: none;
    border: none;
    padding: 0;
  }
  .nav-link:hover { opacity: 0.9; }
  .nav-link.active { opacity: 1; border-bottom: 1.5px solid var(--dark); padding-bottom: 1px; }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 24px 32px 16px;
  }

  .logo-tree { width: 88px; height: 88px; margin-top: 8px; align-self: flex-end; margin-bottom: 4px; cursor: pointer; }
  .logo-tree img { width: 88px; height: 88px; object-fit: contain; background: transparent; mix-blend-mode: multiply; }

  .site-title {
    font-family: 'Averia Serif Libre', serif;
    font-size: clamp(48px, 8vw, 96px);
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 1;
    color: var(--dark);
    cursor: pointer;
  }

  /* ══════════════════════════════
     BROWSE PAGE — grid | info | image
  ══════════════════════════════ */
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 28% 38%;
    min-height: calc(100vh - 160px);
  }

  .grid-wrapper {
    display: flex;
    align-items: flex-start;
  }

  .scroll-track {
    position: fixed;
    top: 24px; bottom: 24px;
    width: 1px;
    background: var(--grid-line);
    flex-shrink: 0;
    z-index: 50;
  }
  .scroll-thumb {
    position: absolute;
    width: 6px; left: -2.5px;
    background: var(--dark);
    transition: top 0.05s linear;
    min-height: 32px;
  }

  .grid-panel {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border-top: 1px solid var(--grid-line);
    border-left: 1px solid var(--grid-line);
    margin-left: 32px;
    margin-top: 24px;
    margin-bottom: 24px;
    align-self: start;
    flex: 1;
  }

  .grid-cell {
    border-right: 1px solid var(--grid-line);
    border-bottom: 1px solid var(--grid-line);
    aspect-ratio: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    overflow: hidden;
    background: var(--cream);
  }
  .grid-cell:hover { background: #e2ddd0; }
  .grid-cell.active { background: var(--dark); }
  .grid-cell.active .instrument-icon { filter: brightness(0) invert(1); }
  .grid-cell.active span { color: var(--cream) !important; }
  .instrument-icon { width: 52%; height: 52%; object-fit: contain; pointer-events: none; }

  /* ── INFO PANEL ── */
  .info-panel { padding: 32px 28px; display: flex; flex-direction: column; }

  .piece-title {
    font-size: 14px; font-weight: 700; text-transform: uppercase;
    letter-spacing: -0.02em; line-height: 0.92; margin-bottom: 28px;
  }
  .piece-title::before { content: '"'; }
  .piece-title::after  { content: '"'; }

  .meta-row { display: flex; align-items: baseline; margin-bottom: 14px; font-size: 13px; text-transform: uppercase; letter-spacing: -0.02em; line-height: 0.92; }
  .meta-label { font-weight: 700; white-space: nowrap; min-width: 72px; }
  .meta-dots { flex: 1; text-align: center; letter-spacing: 0.08em; font-weight: 700; overflow: hidden; white-space: nowrap; padding: 0 4px; }
  .meta-value { white-space: nowrap; font-size: 13px; text-transform: uppercase; letter-spacing: -0.02em; }

  .writing-label { font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: -0.02em; margin-top: 20px; margin-bottom: 10px; }
  .writing-dots { display: inline; letter-spacing: 0.08em; }
  .writing-text { font-size: 12.5px; text-transform: uppercase; letter-spacing: -0.02em; line-height: 1.05; }

  .read-more-btn {
    margin-top: 28px; display: inline-block;
    background: var(--dark); color: var(--cream);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
    padding: 10px 18px; border: none; cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .read-more-btn:hover { background: var(--cream); color: var(--dark); outline: 1.5px solid var(--dark); }

  /* ── IMAGE PANEL (right) ── */
  .image-panel {
    overflow: hidden; position: relative; min-height: 480px;
    padding-right: 24px; padding-top: 24px; padding-bottom: 24px; padding-left: 0;
  }
  .image-panel-inner {
    width: 100%; height: 100%;
    border: 1px solid var(--grid-line);
    overflow: hidden; position: relative; min-height: 432px;
  }
  .tree-image { width: 100%; height: 100%; object-fit: cover; display: block; }
  .image-placeholder {
    width: 100%; height: 100%; min-height: 600px;
    display: flex; align-items: center; justify-content: center;
    color: #5a6b52; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .image-fade { animation: fadeImg 0.35s ease; }
  @keyframes fadeImg { from { opacity: 0; } to { opacity: 1; } }

  /* ══════════════════════════════
     BUTTON VIEW LAYOUT — info | image (no grid)
  ══════════════════════════════ */
  .bv-layout {
    display: grid;
    grid-template-columns: 34% 1fr;
    min-height: calc(100vh - 160px);
  }

  /* ══════════════════════════════
     EXHIBITION VIEW
  ══════════════════════════════ */
  #exhibition-page {
    display: none;
    background: #000;
    color: #fff;
    height: 917px;
    overflow: hidden;
    position: relative;
  }

  /* Exhibition header layout */
  #exhibition-page header {
    background: #000;
    padding: 0;
    position: relative;
    height: 148px;
  }

  #exhibition-page .exhib-header-inner {
    position: relative;
    height: 148px;
    padding: 28px 36px 0;
  }

  #exhibition-page .exhib-title-fixed {
    position: absolute;
    left: 1000px;
    top: 28px;
  }

  #exhibition-page .logo-tree img {
    mix-blend-mode: normal;
    filter: brightness(0) invert(1);
  }

  #exhibition-page .site-title {
    color: #fff;
    font-size: clamp(52px, 8vw, 100px);
    font-family: 'Averia Serif Libre', serif;
  }

  #exhibition-page .nav-link {
    color: #fff;
  }
  #exhibition-page .nav-link.active {
    border-bottom-color: #fff;
  }

  /* Canvas area below header */
  .exhib-canvas {
    position: absolute;
    top: 148px; /* below header */
    left: 0; right: 0; bottom: 0;
  }

  /* Instrument box: fixed 231×231 */
  .exhib-instrument-box {
    position: absolute;
    left: 286px;
    top: 269px; /* page y:417 - header 148 */
    width: 231px;
    height: 231px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .exhib-instrument-box img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .exhib-instrument-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: #1a1a1a;
    color: #555; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
  }

  /* Medium name + quote below instrument box */
  .exhib-text-block {
    position: absolute;
    left: 231px;
    top: 514px;
    width: 340px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .exhib-medium-name {
    font-family: 'Averia Serif Libre', serif;
    font-size: 52px;
    font-weight: 400;
    letter-spacing: -1px;
    line-height: 1.05;
    color: #fff;
    width: 100%;
    text-align: center;
  }

  .exhib-quote {
    font-family: Helvetica, Arial, sans-serif;
    font-size: 21px;
    font-weight: 400;
    font-style: normal;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0;
    width: 100%;
    text-align: center;
  }

  /* Play/pause pop animation */
  @keyframes ppPop {
    0%   { transform: scale(1); }
    35%  { transform: scale(1.18); }
    100% { transform: scale(1); }
  }
  .pp-pop {
    animation: ppPop 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }

  /* Tree image box: 448×673 at x=764, y=229 */
  .exhib-tree-box {
    position: absolute;
    left: 764px;
    top: 66px; /* page y:214 - header 148 */
    width: 448px;
    height: 673px;
    overflow: hidden;
  }
  .exhib-tree-box img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .exhib-tree-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: #111;
    color: #444; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em;
  }

  /* Fade animation for exhibition images — disabled */
  /* .exhib-fade { animation: exhibFadeIn 0.4s ease both; } */
  /* @keyframes exhibFadeIn { from { opacity: 0; } to { opacity: 1; } } */

  /* ══════════════════════════════
     DETAIL MODAL
  ══════════════════════════════ */
  #detail-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(20,25,14,0.65); z-index: 200;
    align-items: center; justify-content: center;
    animation: backdropIn 0.2s ease;
  }
  @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }

  #detail-page {
    position: relative; background: var(--cream);
    width: 92vw; max-width: 1200px; height: 88vh; max-height: 920px;
    border: 1px solid var(--dark); overflow: hidden;
    display: flex; flex-direction: column;
    animation: modalIn 0.3s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes modalIn { from { transform: scale(0.94) translateY(18px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

  .detail-header { display: flex; align-items: center; justify-content: flex-end; padding: 10px 14px; flex-shrink: 0; }
  .close-x-btn { font-size: 18px; background: none; border: none; cursor: pointer; color: var(--dark); padding: 4px 6px; opacity: 0.6; transition: opacity 0.15s; }
  .close-x-btn:hover { opacity: 1; }

  .detail-body { display: grid; grid-template-columns: 44% 1fr; flex: 1; overflow: hidden; min-height: 0; }
  .detail-image-col { overflow: hidden; background: var(--cream); display: flex; align-items: stretch; min-height: 0; }
  .detail-image-col img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .detail-image-placeholder { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; color: #8a9a82; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; }
  .detail-text-col { padding: 28px 36px 40px; overflow-y: auto; min-height: 0; }
  .detail-piece-title { font-size: 22px; font-weight: 700; text-transform: uppercase; letter-spacing: -0.02em; margin-bottom: 28px; line-height: 1.1; }
  .detail-meta { margin-bottom: 28px; }
  .detail-writing-label { font-weight: 700; font-size: 13px; letter-spacing: -0.02em; margin-bottom: 16px; text-transform: uppercase; }
  .detail-essay { font-size: 13.5px; line-height: 1.65; letter-spacing: -0.01em; max-width: 65%; }
</style>
</head>
<body>

<!-- ══════════════ BROWSE PAGE ══════════════ -->
<div id="main-page">
  <header>
    <div class="logo-tree" onclick="showMain()">
      <img src="Images/TreesisLogo.png" alt="Treesis Logo" />
    </div>
    <div style="display:flex;align-items:flex-end;gap:32px;">
      <button class="nav-link active" id="nav-browse" onclick="showMain()">Browse</button>
      <button class="nav-link" id="nav-pres" onclick="showPresentation()">Button View</button>
      <button class="nav-link" id="nav-exhib" onclick="showExhibition()">Exhibition View</button>
      <div class="site-title" onclick="showMain()">treesis</div>
    </div>
  </header>

  <div class="main-layout">
    <!-- LEFT: grid -->
    <div class="grid-wrapper">
      <div class="scroll-track" id="scrollTrack"><div class="scroll-thumb" id="scrollThumb"></div></div>
      <div class="grid-panel" id="gridPanel"></div>
    </div>
    <!-- MIDDLE: info -->
    <div class="info-panel"><div id="infoContent"></div></div>
    <!-- RIGHT: image -->
    <div class="image-panel" id="imagePanel">
      <div class="image-panel-inner">
        <div class="image-placeholder" id="imagePlaceholder">
          <span style="font-size:32px;letter-spacing:-0.02em;text-transform:uppercase;">TREE HERE</span>
        </div>
        <img id="mainImage" class="tree-image" src="" alt="" style="display:none;" />
      </div>
    </div>
  </div>
</div>

<!-- ══════════════ BUTTON VIEW PAGE ══════════════ -->
<div id="presentation-page">
  <header>
    <div class="logo-tree" onclick="showMain()">
      <img src="Images/TreesisLogo.png" alt="Treesis Logo" />
    </div>
    <div style="display:flex;align-items:flex-end;gap:32px;">
      <button class="nav-link" onclick="showMain()">Browse</button>
      <button class="nav-link active">Button View</button>
      <button class="nav-link" onclick="showExhibition()">Exhibition View</button>
      <div class="site-title" onclick="showMain()">treesis</div>
    </div>
  </header>

  <div class="bv-layout">
    <!-- LEFT: info + play/pause -->
    <div class="info-panel" style="display:flex;flex-direction:column;justify-content:space-between;">
      <div id="bv-infoContent"></div>
      <div style="margin-top:32px;">
        <button id="bv-playpause" class="read-more-btn" onclick="bvTogglePlay()" style="margin-top:0;">PAUSE</button>
      </div>
    </div>
    <!-- RIGHT: image -->
    <div class="image-panel" id="bv-imagePanel">
      <div class="image-panel-inner" style="min-height:520px;">
        <div class="image-placeholder" id="bv-imagePlaceholder">
          <span style="font-size:32px;letter-spacing:-0.02em;text-transform:uppercase;">TREE HERE</span>
        </div>
        <img id="bv-mainImage" class="tree-image" src="" alt="" style="display:none;" />
      </div>
    </div>
  </div>
</div>

<!-- ══════════════ EXHIBITION VIEW PAGE ══════════════ -->
<div id="exhibition-page">
  <header>
    <div class="exhib-header-inner">
      <div style="display:flex;align-items:flex-end;gap:32px;padding-top:60px;">
        <div class="logo-tree" onclick="exhibTogglePlay()" style="cursor:pointer;width:52px;height:52px;margin-bottom:0;">
          <img src="Images/TreesisLogo.png" alt="Treesis Logo" style="width:52px;height:52px;" />
        </div>
        <button class="nav-link" onclick="showMain()">Browse</button>
        <button class="nav-link" onclick="showPresentation()">Button View</button>
        <button class="nav-link active">Exhibition View</button>
      </div>
      <div class="exhib-title-fixed site-title" onclick="showMain()" style="cursor:pointer;">treesis</div>
    </div>
  </header>

  <div class="exhib-canvas">

    <!-- "click the _ to [play/pause]" row -->
    <div style="position:absolute;left:286px;top:122px;width:231px;display:flex;align-items:center;justify-content:center;gap:0;">
      <img src="Images/clickthebutton.png" alt="click the button to pause/play" style="height:52px;object-fit:contain;" />
      <button id="exhib-playpause" onclick="exhibTogglePlay()" style="background:none;border:none;cursor:pointer;padding:0;margin-left:12px;display:flex;align-items:center;">
        <img id="exhib-ppIcon" src="Images/PlayButton.png" alt="Play" style="width:52px;height:52px;object-fit:contain;" />
      </button>
    </div>

    <!-- Instrument / medium image box -->
    <div class="exhib-instrument-box" id="exhib-instrBox">
      <div class="exhib-instrument-placeholder" id="exhib-instrPlaceholder">—</div>
      <img id="exhib-instrImg" src="" alt="" style="display:none;" />
    </div>

    <!-- Medium name + quote -->
    <div class="exhib-text-block">
      <div class="exhib-medium-name" id="exhib-mediumName">—</div>
      <div class="exhib-quote" id="exhib-quote"></div>
    </div>

    <!-- Large tree image box -->
    <div class="exhib-tree-box" id="exhib-treeBox">
      <div class="exhib-tree-placeholder" id="exhib-treePlaceholder">Tree Here</div>
      <img id="exhib-treeImg" src="" alt="" style="display:none;" />
    </div>

  </div>
</div>

<!-- ══════════════ DETAIL MODAL ══════════════ -->
<div id="detail-backdrop">
  <div id="detail-page">
    <div class="detail-header">
      <button class="close-x-btn" onclick="closeDetail()">&#x2715;</button>
    </div>
    <div class="detail-body">
      <div class="detail-image-col">
        <img id="detailImage" src="" alt="" style="display:none;" />
        <div class="detail-image-placeholder" id="detailImagePlaceholder">Tree Here</div>
      </div>
      <div class="detail-text-col">
        <div class="detail-piece-title" id="detailTitle"></div>
        <div class="detail-meta" id="detailMeta"></div>
        <div class="detail-writing-label">Writing:</div>
        <div class="detail-essay" id="detailEssay"></div>
      </div>
    </div>
  </div>
</div>

<!-- CURSOR LABEL -->
<div id="cursor-label" style="display:none;position:fixed;pointer-events:none;z-index:9999;background:var(--cream);border:1px solid var(--dark);padding:4px 8px;font-family:Helvetica,Arial,sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--dark);white-space:nowrap;"></div>

function loadPieces() {
  try {
    const version = localStorage.getItem('treesis_version');
    if (version !== '2') { localStorage.removeItem('treesis_pieces'); localStorage.setItem('treesis_version', '2'); }
    const s = localStorage.getItem('treesis_pieces');
    return s ? JSON.parse(s) : DEFAULT_PIECES;
  }
  catch(e) { return DEFAULT_PIECES; }
}
function savePieces(arr) { localStorage.setItem('treesis_pieces', JSON.stringify(arr)); }

// ── BUILD GRID ──
function buildGrid() {
  const panel = document.getElementById('gridPanel');
  panel.innerHTML = '';
  pieces.forEach(piece => {
    const cell = document.createElement('div');
    cell.className = 'grid-cell';
    cell.dataset.id = piece.id;
    if (piece.instrumentImg) {
      const img = document.createElement('img');
      img.src = piece.instrumentImg; img.alt = piece.instrumentLabel; img.className = 'instrument-icon';
      cell.appendChild(img);
    } else {
      const span = document.createElement('span');
      span.style.cssText = 'font-size:clamp(18px,2.5vw,28px);font-family:Helvetica,Arial,sans-serif;color:var(--dark);';
      span.textContent = piece.instrumentSymbol || '✦';
      cell.appendChild(span);
    }
    cell.addEventListener('click', () => selectPiece(piece.id));
    cell.addEventListener('mouseenter', () => { const l = document.getElementById('cursor-label'); l.textContent = piece.instrumentLabel; l.style.display = 'block'; });
    cell.addEventListener('mouseleave', () => { document.getElementById('cursor-label').style.display = 'none'; });
    panel.appendChild(cell);
  });
}

// ── SELECT PIECE ──
function selectPiece(id) {
  activePieceId = id;
  const piece = pieces.find(p => p.id === id);
  if (!piece) return;
  document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('active'));
  const cell = document.querySelector(`.grid-cell[data-id="${id}"]`);
  if (cell) cell.classList.add('active');

  const ph = document.getElementById('imagePlaceholder');
  const img = document.getElementById('mainImage');
  if (piece.imageSrc) {
    img.src = piece.imageSrc; img.alt = piece.title; img.style.display = 'block';
    img.classList.remove('image-fade'); void img.offsetWidth; img.classList.add('image-fade');
    ph.style.display = 'none';
  } else {
    ph.style.display = 'flex';
    ph.innerHTML = `<span style="font-size:32px;letter-spacing:-0.02em;text-transform:uppercase;">TREE HERE</span>`;
    img.style.display = 'none';

  if (id === 1) {
    document.getElementById('infoContent').innerHTML = `
      <div class="piece-title">Default Photo</div>
      <div class="writing-text" style="margin-top:16px;">${piece.shortText}</div>`;
  } else {
    document.getElementById('infoContent').innerHTML = `

function bvGetImagePieces() {
  return pieces.filter(p => p.imageSrc);
}

function bvShuffleNew(exclude) {
  const pool = bvGetImagePieces();
  if (pool.length === 0) return pool;
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  // Move the excluded piece away from the front to avoid immediate repeat
  if (exclude && shuffled[0] && shuffled[0].id === exclude) {
    shuffled.push(shuffled.shift());
  }
  return shuffled;
}

function bvShowPiece(piece) {
  bvActivePieceId = piece.id;
  const ph = document.getElementById('bv-imagePlaceholder');
  const img = document.getElementById('bv-mainImage');

  img.src = piece.imageSrc;
  img.alt = piece.title;
  img.style.display = 'block';
  ph.style.display = 'none';

  if (piece.id === 1) {
    document.getElementById('bv-infoContent').innerHTML = `
      <div class="piece-title">Default Photo</div>
      <div class="writing-text" style="margin-top:16px;">${piece.shortText}</div>`;
  } else {
    document.getElementById('bv-infoContent').innerHTML = `
      <div class="piece-title">${piece.title}</div>
      <div class="meta-row"><span class="meta-label">MEDIUM</span><span class="meta-dots">. . . . . . . . . . . . . . . . . . . .</span><span class="meta-value">${piece.medium}</span></div>
      <div class="meta-row"><span class="meta-label">DATE</span><span class="meta-dots">. . . . . . . . . . . . . . . . . . . .</span><span class="meta-value">${piece.date}</span></div>
      <div class="writing-label">WRITING <span class="writing-dots">. . . . . . . . . .</span></div>
      <div class="writing-text">${piece.shortText}</div>
      <button class="read-more-btn" onclick="openDetail(${piece.id})" style="margin-top:28px;">Read More →</button>`;
  }
}

function bvNext() {
  if (bvShuffleQueue.length === 0) {
    bvShuffleQueue = bvShuffleNew(bvActivePieceId);
  }
  if (bvShuffleQueue.length === 0) return; // no images at all
  const next = bvShuffleQueue.shift();
  bvShowPiece(next);
}

function bvStart() {
  bvPlaying = true;
  document.getElementById('bv-playpause').textContent = 'PAUSE';
  if (bvShuffleQueue.length === 0) bvShuffleQueue = bvShuffleNew(bvActivePieceId);
  bvNext();
  clearInterval(bvTimer);
  bvTimer = setInterval(bvNext, 750);
}

function bvStop() {
  bvPlaying = false;
  document.getElementById('bv-playpause').textContent = 'PLAY';
  clearInterval(bvTimer);
  bvTimer = null;
}

function bvTogglePlay() {
  if (bvPlaying) { bvStop(); } else { bvStart(); }
}

function exhibNext() {

function exhibStart() {

function exhibStop() {
  exhibPlaying = false;

  const icon = document.getElementById('exhib-ppIcon');

function exhibTogglePlay() {
  const icon = document.getElementById('exhib-ppIcon');

    icon.classList.remove('pp-pop');
    void icon.offsetWidth; // force reflow to restart animation

  }
  if (exhibPlaying) { exhibStop(); } else { exhibStart(); }
}

function deletePiece(id) {
  if (!confirm('Delete this piece?')) return;
  pieces = pieces.filter(p => p.id !== id);
  savePieces(pieces); buildGrid(); renderAdminList(); selectPiece(1);
}
function saveAdminForm() {
  const editId = document.getElementById('edit-id').value;
  const title = document.getElementById('f-title').value.trim();
  const medium = document.getElementById('f-medium').value.trim();
  const date = document.getElementById('f-date').value.trim();
  const instrumentLabel = document.getElementById('f-instrumentLabel').value.trim();
  const instrumentImg = document.getElementById('f-instrumentImg').value.trim();
  const imageSrc = document.getElementById('f-imageSrc').value.trim();
  const shortText = document.getElementById('f-shortText').value.trim();
  const fullEssay = document.getElementById('f-fullEssay').value.trim();
  if (!title || !medium || !date) { alert('Title, Medium and Date are required.'); return; }
  if (editId) {
    pieces = pieces.map(p => p.id === parseInt(editId) ? {...p, title, medium, date, instrumentLabel, instrumentImg, imageSrc, shortText, fullEssay} : p);
  } else {
    const newId = pieces.length > 0 ? Math.max(...pieces.map(p => p.id)) + 1 : 1;
    pieces.push({id: newId, title, medium, date, instrumentLabel: instrumentLabel || medium, instrumentImg, instrumentSymbol:'✦', imageSrc, shortText, fullEssay});
  }
  savePieces(pieces); buildGrid(); renderAdminList(); clearAdminForm();
  if (activePieceId) selectPiece(activePieceId);
  document.getElementById('admin-save-confirm').style.display = 'block';
  setTimeout(() => document.getElementById('admin-save-confirm').style.display = 'none', 2000);
}

document.addEventListener('click', e => { if (e.clientX < 40 && e.clientY > window.innerHeight - 40) openAdminLogin(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('admin-overlay').style.display === 'flex') {
    checkAdminPassword();
    return;
  }
  const onExhibition = document.getElementById('exhibition-page').style.display === 'block';
  const onButtonView = document.getElementById('presentation-page').style.display === 'block';

  // Spacebar — toggle play/pause on Exhibition or Button View
  if (e.code === 'Space' && !e.metaKey && !e.ctrlKey && !e.altKey) {
    if (onExhibition) { e.preventDefault(); exhibTogglePlay(); return; }
    if (onButtonView) { e.preventDefault(); bvTogglePlay(); return; }
  }

  // Backslash \ hotkey
  if (e.key === '\\' && !e.metaKey && !e.ctrlKey && !e.altKey) {
    if (onExhibition) { e.preventDefault(); exhibTogglePlay(); return; }
    if (onButtonView) { e.preventDefault(); bvTogglePlay(); return; }
  }

  // Cmd/Ctrl + ; + ] — toggle on Exhibition View only
  if ((e.metaKey || e.ctrlKey) && e.key === ']' && !e.shiftKey) {
    if (window._semicolonHeld) {
      e.preventDefault();
      if (onExhibition) exhibTogglePlay();
      else if (onButtonView) bvTogglePlay();
    }
  }
});
// Track semicolon hold state
window._semicolonHeld = false;
document.addEventListener('keydown', e => { if (e.key === ';') window._semicolonHeld = true; });
document.addEventListener('keyup',  e => { if (e.key === ';') window._semicolonHeld = false; });

// ── INIT ──
buildGrid();
selectPiece(1);

// ── CURSOR LABEL ──
document.addEventListener('mousemove', e => {
  const l = document.getElementById('cursor-label');
  if (l) { l.style.left = (e.clientX + 14) + 'px'; l.style.top = (e.clientY + 14) + 'px'; }
});

// ── SCROLL INDICATOR ──
function updateScrollThumb() {
  const track = document.getElementById('scrollTrack');
  const thumb = document.getElementById('scrollThumb');
  const grid = document.getElementById('gridPanel');
  if (!track || !thumb || !grid) return;
  const rect = grid.getBoundingClientRect();
  track.style.left = (rect.left / 2) + 'px';
  const trackH = window.innerHeight - 48;
  const docH = document.documentElement.scrollHeight;
  const scrollRange = docH - window.innerHeight;
  const thumbH = Math.max(32, (window.innerHeight / docH) * trackH);
  const thumbTop = scrollRange > 0 ? (window.scrollY / scrollRange) * (trackH - thumbH) : 0;
  thumb.style.height = thumbH + 'px';
  thumb.style.top = thumbTop + 'px';
}
window.addEventListener('scroll', updateScrollThumb);
window.addEventListener('resize', updateScrollThumb);
updateScrollThumb();

// ── MATCH IMAGE PANEL HEIGHT TO GRID ──
function matchImageToGrid() {
  const grid = document.getElementById('gridPanel');
  const panel = document.getElementById('imagePanel');
  if (!grid || !panel) return;
  panel.style.height = (grid.offsetHeight + 48) + 'px';
  panel.style.minHeight = 'unset';
}
window.addEventListener('resize', matchImageToGrid);
requestAnimationFrame(() => requestAnimationFrame(matchImageToGrid));
</script>
