<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>treesis</title>
<link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="Images/TreesisLogo.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f0ebe0;
    --dark: #282D1D;
    --mid: #3a3a2e;
    --grid-line: #282D1D;
  }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: Helvetica, Arial, sans-serif;
    letter-spacing: -0.02em;
    line-height: 0.92;
    overflow-x: hidden;
  }

  .nav-link {
    font-family: Helvetica, Arial, sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--dark);
    cursor: pointer;
    opacity: 0.45;
    transition: opacity 0.15s;
    line-height: 1;
    background: none;
    border: none;
    padding: 0;
  }
  .nav-link:hover { opacity: 0.9; }
  .nav-link.active { opacity: 1; border-bottom: 1.5px solid var(--dark); padding-bottom: 1px; }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 24px 32px 16px;
  }

  .logo-tree { width: 88px; height: 88px; margin-top: 8px; align-self: flex-end; margin-bottom: 4px; cursor: pointer; }
  .logo-tree img { width: 88px; height: 88px; object-fit: contain; background: transparent; mix-blend-mode: multiply; }

  .site-title {
    font-family: 'Averia Serif Libre', serif;
    font-size: clamp(48px, 8vw, 96px);
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 1;
    color: var(--dark);
    cursor: pointer;
  }

  /* ══════════════════════════════
     BROWSE PAGE — grid | info | image
  ══════════════════════════════ */
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 28% 38%;
    min-height: calc(100vh - 160px);
  }

  .grid-wrapper {
    display: flex;
    align-items: flex-start;
  }

  .scroll-track {
    position: fixed;
    top: 24px; bottom: 24px;
    width: 1px;
    background: var(--grid-line);
    flex-shrink: 0;
    z-index: 50;
  }
  .scroll-thumb {
    position: absolute;
    width: 6px; left: -2.5px;
    background: var(--dark);
    transition: top 0.05s linear;
    min-height: 32px;
  }

  .grid-panel {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border-top: 1px solid var(--grid-line);
    border-left: 1px solid var(--grid-line);
    margin-left: 32px;
    margin-top: 24px;
    margin-bottom: 24px;
    align-self: start;
    flex: 1;
  }

  .grid-cell {
    border-right: 1px solid var(--grid-line);
    border-bottom: 1px solid var(--grid-line);
    aspect-ratio: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    overflow: hidden;
    background: var(--cream);
  }
  .grid-cell:hover { background: #e2ddd0; }
  .grid-cell.active { background: var(--dark); }
  .grid-cell.active .instrument-icon { filter: brightness(0) invert(1); }
  .grid-cell.active span { color: var(--cream) !important; }
  .instrument-icon { width: 52%; height: 52%; object-fit: contain; pointer-events: none; }

  /* ── INFO PANEL ── */
  .info-panel { padding: 32px 28px; display: flex; flex-direction: column; }

  .piece-title {
    font-size: 14px; font-weight: 700; text-transform: uppercase;
    letter-spacing: -0.02em; line-height: 0.92; margin-bottom: 28px;
  }
  .piece-title::before { content: '"'; }
  .piece-title::after  { content: '"'; }

  .meta-row { display: flex; align-items: baseline; margin-bottom: 14px; font-size: 13px; text-transform: uppercase; letter-spacing: -0.02em; line-height: 0.92; }
  .meta-label { font-weight: 700; white-space: nowrap; min-width: 72px; }
  .meta-dots { flex: 1; text-align: center; letter-spacing: 0.08em; font-weight: 700; overflow: hidden; white-space: nowrap; padding: 0 4px; }
  .meta-value { white-space: nowrap; font-size: 13px; text-transform: uppercase; letter-spacing: -0.02em; }

  .writing-label { font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: -0.02em; margin-top: 20px; margin-bottom: 10px; }
  .writing-dots { display: inline; letter-spacing: 0.08em; }
  .writing-text { font-size: 12.5px; text-transform: uppercase; letter-spacing: -0.02em; line-height: 1.05; }

  .read-more-btn {
    margin-top: 28px; display: inline-block;
    background: var(--dark); color: var(--cream);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
    padding: 10px 18px; border: none; cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .read-more-btn:hover { background: var(--cream); color: var(--dark); outline: 1.5px solid var(--dark); }

  /* ── IMAGE PANEL (right) ── */
  .image-panel {
    overflow: hidden; position: relative; min-height: 480px;
    padding-right: 24px; padding-top: 24px; padding-bottom: 24px; padding-left: 0;
  }
  .image-panel-inner {
    width: 100%; height: 100%;
    border: 1px solid var(--grid-line);
    overflow: hidden; position: relative; min-height: 432px;
  }
  .tree-image { width: 100%; height: 100%; object-fit: cover; display: block; }
  .image-placeholder {
    width: 100%; height: 100%; min-height: 600px;
    display: flex; align-items: center; justify-content: center;
    color: #5a6b52; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .image-fade { animation: fadeImg 0.35s ease; }
  @keyframes fadeImg { from { opacity: 0; } to { opacity: 1; } }

  /* ══════════════════════════════
     BUTTON VIEW LAYOUT — info | image (no grid)
  ══════════════════════════════ */
  .bv-layout {
    display: grid;
    grid-template-columns: 34% 1fr;
    min-height: calc(100vh - 160px);
  }

  /* ══════════════════════════════
     EXHIBITION VIEW
  ══════════════════════════════ */
  #exhibition-page {
    display: block;
    background: #000;
    color: #fff;
    min-height: 917px;
    overflow-y: auto;
    position: relative;
    cursor: none;
  }

  /* White circle cursor */
  .exhib-cursor {
    position: fixed;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #fff;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%, -50%);
    transition: transform 0.08s ease, opacity 0.15s;
    mix-blend-mode: difference;
  }

  /* Exhibition header layout */
  #exhibition-page header {
    background: #000;
    padding: 0;
    position: relative;
    height: 148px;
  }

  #exhibition-page .exhib-header-inner {
    position: relative;
    height: 148px;
    padding: 28px 36px 0;
  }

  #exhibition-page .exhib-title-fixed {
    position: absolute;
    left: 1000px;
    top: 28px;
  }

  /* Fullscreen mode — hide nav and title, keep logo */
  #exhibition-page.is-fullscreen .exhib-title-fixed { display: none; }
  #exhibition-page.is-fullscreen .nav-link { display: none; }
  #exhibition-page.is-fullscreen #exhib-fs-btn { display: none; }

  #exhibition-page .logo-tree img {
    mix-blend-mode: normal;
    filter: brightness(0) invert(1);
  }

  #exhibition-page .site-title {
    color: #fff;
    font-size: clamp(52px, 8vw, 100px);
    font-family: 'Averia Serif Libre', serif;
  }

  #exhibition-page .nav-link {
    color: #fff;
  }
  #exhibition-page .nav-link.active {
    border-bottom-color: #fff;
  }

  /* Canvas area below header */
  .exhib-canvas {
    position: absolute;
    top: 148px; /* below header */
    left: 0; right: 0; bottom: 0;
  }

  /* Instrument box: fixed 231×231 */
  .exhib-instrument-box {
    position: absolute;
    left: 286px;
    top: 269px; /* page y:417 - header 148 */
    width: 231px;
    height: 231px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .exhib-instrument-box img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .exhib-instrument-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: #1a1a1a;
    color: #555; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
  }

  /* Medium name + quote below instrument box */
  .exhib-text-block {
    position: absolute;
    left: 231px;
    top: 514px;
    width: 340px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .exhib-medium-name {
    font-family: 'Averia Serif Libre', serif;
    font-size: 52px;
    font-weight: 400;
    letter-spacing: -1px;
    line-height: 1.05;
    color: #fff;
    width: 100%;
    text-align: center;
  }

  .exhib-quote {
    font-family: Helvetica, Arial, sans-serif;
    font-size: 21px;
    font-weight: 400;
    font-style: normal;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0;
    width: 100%;
    text-align: center;
  }

  /* Play/pause pop animation */
  @keyframes ppPop {
    0%   { transform: scale(1); }
    35%  { transform: scale(1.18); }
    100% { transform: scale(1); }
  }
  .pp-pop {
    animation: ppPop 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }

  /* Tree box scale when paused */
  .exhib-tree-box.is-paused { transform: scale(1.045); }

  /* Tree image box: 448×673 at x=764, y=229 */
  .exhib-tree-box {
    position: absolute;
    transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    transform-origin: center center;
    left: 764px;
    top: -34px; /* moved up 100px from y:214 */
    width: 448px;
    height: 673px;
    overflow: hidden;
  }
  .exhib-tree-box img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .exhib-tree-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: #111;
    color: #444; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em;
  }

  /* Fade animation for exhibition images — disabled */
  /* .exhib-fade { animation: exhibFadeIn 0.4s ease both; } */
  /* @keyframes exhibFadeIn { from { opacity: 0; } to { opacity: 1; } } */

  /* ══════════════════════════════
     DETAIL MODAL
  ══════════════════════════════ */
  #detail-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(20,25,14,0.65); z-index: 200;
    align-items: center; justify-content: center;
    animation: backdropIn 0.2s ease;
  }
  @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }

  #detail-page {
    position: relative; background: var(--cream);
    width: 92vw; max-width: 1200px; height: 88vh; max-height: 920px;
    border: 1px solid var(--dark); overflow: hidden;
    display: flex; flex-direction: column;
    animation: modalIn 0.3s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes modalIn { from { transform: scale(0.94) translateY(18px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

  .detail-header { display: flex; align-items: center; justify-content: flex-end; padding: 10px 14px; flex-shrink: 0; }
  .close-x-btn { font-size: 18px; background: none; border: none; cursor: pointer; color: var(--dark); padding: 4px 6px; opacity: 0.6; transition: opacity 0.15s; }
  .close-x-btn:hover { opacity: 1; }

  .detail-body { display: grid; grid-template-columns: 44% 1fr; flex: 1; overflow: hidden; min-height: 0; }
  .detail-image-col { overflow: hidden; background: var(--cream); display: flex; align-items: stretch; min-height: 0; }
  .detail-image-col img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .detail-image-placeholder { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; color: #8a9a82; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; }
  .detail-text-col { padding: 28px 36px 40px; overflow-y: auto; min-height: 0; }
  .detail-piece-title { font-size: 22px; font-weight: 700; text-transform: uppercase; letter-spacing: -0.02em; margin-bottom: 28px; line-height: 1.1; }
  .detail-meta { margin-bottom: 28px; }
  .detail-writing-label { font-weight: 700; font-size: 13px; letter-spacing: -0.02em; margin-bottom: 16px; text-transform: uppercase; }
  .detail-essay { font-size: 13.5px; line-height: 1.65; letter-spacing: -0.01em; max-width: 65%; }
</style>
</head>
<body>

<!-- ══════════════ EXHIBITION VIEW PAGE ══════════════ -->
<div id="exhibition-page">
<div class="exhib-cursor" id="exhibCursor"></div>
  <header>
    <div class="exhib-header-inner">
      <div style="display:flex;align-items:flex-end;gap:32px;padding-top:60px;">
        <div class="logo-tree" onclick="exhibTogglePlay()" style="cursor:pointer;width:52px;height:52px;margin-bottom:0;">
          <img src="Images/TreesisLogo.png" alt="Treesis Logo" style="width:52px;height:52px;" />
        </div>
        <button class="nav-link active">Exhibition View</button>
        <button class="nav-link" id="exhib-fs-btn" onclick="toggleFullscreen()" style="opacity:0.45;">⛶ Fullscreen</button>
      </div>
      <div class="exhib-title-fixed site-title" onclick="" style="cursor:pointer;">treesis</div>
    </div>
  </header>

  <div class="exhib-canvas">

    <!-- "click the _ to [play/pause]" row -->
    <div style="position:absolute;left:286px;top:122px;width:231px;display:flex;align-items:center;justify-content:center;gap:0;">
      <img src="Images/clickthebutton.png" alt="click the button to pause/play" style="height:52px;object-fit:contain;" />
      <button id="exhib-playpause" onclick="exhibTogglePlay()" style="background:none;border:none;cursor:pointer;padding:0;margin-left:12px;display:flex;align-items:center;">
        <img id="exhib-ppIcon" src="Images/PlayButton.png" alt="Play" style="width:52px;height:52px;object-fit:contain;" />
      </button>
    </div>

    <!-- Instrument / medium image box -->
    <div class="exhib-instrument-box" id="exhib-instrBox">
      <div class="exhib-instrument-placeholder" id="exhib-instrPlaceholder">—</div>
      <img id="exhib-instrImg" src="" alt="" style="display:none;" />
    </div>

    <!-- Medium name + quote -->
    <div class="exhib-text-block">
      <div class="exhib-medium-name" id="exhib-mediumName">—</div>
      <div class="exhib-quote" id="exhib-quote"></div>
    </div>

    <!-- Large tree image box -->
    <div class="exhib-tree-box" id="exhib-treeBox">
      <div class="exhib-tree-placeholder" id="exhib-treePlaceholder">Tree Here</div>
      <img id="exhib-treeImg" src="" alt="" style="display:none;" />
    </div>

  </div>
</div>

<!-- ══════════════ DETAIL MODAL ══════════════ -->
<div id="detail-backdrop">
  <div id="detail-page">
    <div class="detail-header">
      <button class="close-x-btn" onclick="closeDetail()">&#x2715;</button>
    </div>
    <div class="detail-body">
      <div class="detail-image-col">
        <img id="detailImage" src="" alt="" style="display:none;" />
        <div class="detail-image-placeholder" id="detailImagePlaceholder">Tree Here</div>
      </div>
      <div class="detail-text-col">
        <div class="detail-piece-title" id="detailTitle"></div>
        <div class="detail-meta" id="detailMeta"></div>
        <div class="detail-writing-label">Writing:</div>
        <div class="detail-essay" id="detailEssay"></div>
      </div>
    </div>
  </div>
</div>

<!-- CURSOR LABEL -->
<div id="cursor-label" style="display:none;position:fixed;pointer-events:none;z-index:9999;background:var(--cream);border:1px solid var(--dark);padding:4px 8px;font-family:Helvetica,Arial,sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--dark);white-space:nowrap;"></div>

function loadPieces() {
  try {
    const version = localStorage.getItem('treesis_version');
    if (version !== '2') { localStorage.removeItem('treesis_pieces'); localStorage.setItem('treesis_version', '2'); }
    const s = localStorage.getItem('treesis_pieces');
    return s ? JSON.parse(s) : DEFAULT_PIECES;
  }
  catch(e) { return DEFAULT_PIECES; }
}
function savePieces(arr) { localStorage.setItem('treesis_pieces', JSON.stringify(arr)); }

let pieces = loadPieces();
let activePieceId = null;
let adminAuthenticated = false;

// ══════════════════════════════════════════
// EXHIBITION VIEW — random slideshow
// ══════════════════════════════════════════
let exhibActivePieceId = null;
let exhibPlaying = false;
let exhibTimer = null;
let exhibQueue = [];

function closeDetail() {
  document.getElementById('detail-backdrop').style.display = 'none';
  document.body.style.overflow = '';
}
document.getElementById('detail-backdrop').addEventListener('click', function(e) { if (e.target === this) closeDetail(); });

function exhibGetPieces() { return pieces.filter(p => p.imageSrc); }

function exhibShuffleNew(excludeId) {
  const pool = exhibGetPieces();
  if (!pool.length) return pool;
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  if (excludeId && shuffled[0] && shuffled[0].id === excludeId) shuffled.push(shuffled.shift());
  return shuffled;
}

function exhibShowPiece(piece) {
  exhibActivePieceId = piece.id;
  const treeImg = document.getElementById('exhib-treeImg');
  const treePh  = document.getElementById('exhib-treePlaceholder');
  treeImg.src = piece.imageSrc; treeImg.alt = piece.title;
  treeImg.style.display = 'block'; treePh.style.display = 'none';

  const instrImg = document.getElementById('exhib-instrImg');
  const instrPh  = document.getElementById('exhib-instrPlaceholder');
  if (piece.instrumentImg) {
    instrImg.src = piece.instrumentImg; instrImg.style.display = 'block'; instrPh.style.display = 'none';
  } else {
    instrImg.style.display = 'none'; instrPh.style.display = 'flex';
    instrPh.textContent = piece.instrumentSymbol || '—';
    instrPh.style.fontSize = '48px'; instrPh.style.color = '#fff'; instrPh.style.background = 'transparent';
  }
  document.getElementById('exhib-mediumName').textContent = piece.medium;
  document.getElementById('exhib-quote').textContent = piece.title ? `"${piece.title}"` : '';
}

function exhibNext() {
  if (!exhibQueue.length) exhibQueue = exhibShuffleNew(exhibActivePieceId);
  if (!exhibQueue.length) return;
  exhibShowPiece(exhibQueue.shift());
}

let exhibAutoResumeTimer = null;

function exhibStart() {
  exhibPlaying = true;
  clearTimeout(exhibAutoResumeTimer); exhibAutoResumeTimer = null;
  const icon = document.getElementById('exhib-ppIcon');
  if (icon) { icon.src = 'Images/PauseButton.png'; icon.alt = 'Pause'; }
  // Tree box back to normal size
  const treeBox = document.getElementById('exhib-treeBox');
  if (treeBox) treeBox.classList.remove('is-paused');
  if (!exhibQueue.length) exhibQueue = exhibShuffleNew(exhibActivePieceId);
  exhibNext();
  clearInterval(exhibTimer);
  exhibTimer = setInterval(exhibNext, 750);
}

function exhibStop() {
  exhibPlaying = false;
  const icon = document.getElementById('exhib-ppIcon');
  if (icon) { icon.src = 'Images/PlayButton.png'; icon.alt = 'Play'; }
  clearInterval(exhibTimer); exhibTimer = null;
  // Scale up tree box
  const treeBox = document.getElementById('exhib-treeBox');
  if (treeBox) {
    treeBox.classList.remove('is-paused');
    void treeBox.offsetWidth;
    treeBox.classList.add('is-paused');
  }
  // Auto-resume after 2 minutes
  clearTimeout(exhibAutoResumeTimer);
  exhibAutoResumeTimer = setTimeout(() => { exhibStart(); }, 2 * 60 * 1000);
}

function exhibTogglePlay() {
  const icon = document.getElementById('exhib-ppIcon');
  if (icon) { icon.classList.remove('pp-pop'); void icon.offsetWidth; icon.classList.add('pp-pop'); }
  if (exhibPlaying) { exhibStop(); } else { exhibStart(); }
}

function toggleFullscreen() {
  const el = document.getElementById('exhibition-page');
  if (!document.fullscreenElement) { el.requestFullscreen && el.requestFullscreen(); }
  else { document.exitFullscreen && document.exitFullscreen(); }
}

document.addEventListener('fullscreenchange', () => {
  const btn = document.getElementById('exhib-fs-btn');
  const page = document.getElementById('exhibition-page');
  if (document.fullscreenElement) {
    page.classList.add('is-fullscreen');
    if (btn) btn.textContent = '⛶ Exit Fullscreen';
  } else {
    page.classList.remove('is-fullscreen');
    if (btn) btn.textContent = '⛶ Fullscreen';
  }
});

document.addEventListener('click', e => { if (e.clientX < 40 && e.clientY > window.innerHeight - 40) openAdminLogin(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('admin-overlay').style.display === 'flex') { checkAdminPassword(); return; }
  if (e.code === 'Space' && !e.metaKey && !e.ctrlKey && !e.altKey) { e.preventDefault(); exhibTogglePlay(); return; }
  if (e.key === '\\' && !e.metaKey && !e.ctrlKey && !e.altKey) { e.preventDefault(); exhibTogglePlay(); return; }
  if ((e.metaKey || e.ctrlKey) && e.key === ']' && !e.shiftKey && window._semicolonHeld) { e.preventDefault(); exhibTogglePlay(); }
});
window._semicolonHeld = false;
document.addEventListener('keydown', e => { if (e.key === ';') window._semicolonHeld = true; });
document.addEventListener('keyup',   e => { if (e.key === ';') window._semicolonHeld = false; });

// ── INIT — start exhibition immediately ──
exhibStart();

// ── WHITE CIRCLE CURSOR ──
const exhibCursor = document.getElementById('exhibCursor');
document.addEventListener('mousemove', e => {
  if (exhibCursor) { exhibCursor.style.left = e.clientX + 'px'; exhibCursor.style.top = e.clientY + 'px'; }
});
</script>

      <div style="margin-bottom:20px;">
        <label style="font-size:10px;text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:4px;">Full Essay (detail modal)</label>
        <textarea id="f-fullEssay" rows="5" style="width:100%;padding:8px;font-family:Helvetica,Arial,sans-serif;font-size:12px;border:1px solid var(--dark);background:var(--cream);outline:none;resize:vertical;"></textarea>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <button onclick="saveAdminForm()" style="padding:12px 28px;background:var(--dark);color:var(--cream);border:none;cursor:pointer;font-family:Helvetica,Arial,sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;">Save Piece</button>

        <span id="admin-save-confirm" style="display:none;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:green;">✓ Saved!</span>
      </div>
    </div>
  </div>
